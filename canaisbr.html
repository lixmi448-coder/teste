<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canais Brasileiros</title>
    
    <style>
        body { 
            margin: 0; 
            /* Fundo específico solicitado */
            background: url('imagens/fundo3.png') no-repeat center center fixed; 
            background-size: cover; 
            font-family: sans-serif; 
            color: white; 
            padding: 20px;
        }

        .header-container { text-align: center; margin-bottom: 30px; }

        .grid-canais { 
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap; 
            gap: 30px; 
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .canal { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            cursor: pointer; 
            width: 150px; 
            transition: 0.3s;
        }

        .canal:hover { transform: scale(1.1); }

        .canal img { 
            width: 150px; 
            height: 150px; 
            border-radius: 15px; 
            border: 3px solid #00d4ff; 
            background-color: white; 
            object-fit: cover; 
        }

        .nome-canal { 
            margin-top: 8px; 
            font-weight: bold; 
            text-shadow: 1px 1px 2px #000; 
        }

        .btn-voltar { 
            display: block; margin: 30px auto; width: 150px; padding: 10px; 
            background: #00d4ff; text-decoration: none; color: black; 
            font-weight: bold; text-align: center; border-radius: 5px; 
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Canais Brasileiros</h1>
    </div>

    <div class="grid-canais">
        <!-- Life America -->
        <div class="canal" onclick="window.location.href='lifeamerica.html'">
            <img src="imagens/lifeamerica.png" alt="Life America">
            <span class="nome-canal">Life America</span>
        </div>

        <!-- Passo Fundo -->
        <div class="canal" onclick="window.location.href='passofundo.html'">
            <img src="imagens/passofundo.png" alt="Passo Fundo">
            <span class="nome-canal">Passo Fundo</span>
        </div>

        <!-- TV Aldeia -->
        <div class="canal" onclick="window.location.href='tvaldeia.html'">
            <img src="imagens/tvaldeia.png" alt="TV Aldeia">
            <span class="nome-canal">TV Aldeia</span>
        </div>

        <!-- TV Cultura -->
        <div class="canal" onclick="window.location.href='tvcultura.html'">
            <img src="imagens/tvcultura.png" alt="TV Cultura">
            <span class="nome-canal">TV Cultura</span>
        </div>

        <!-- TV Video News -->
        <div class="canal" onclick="window.location.href='tvideonews.html'">
            <img src="imagens/tvideonews.png" alt="TV Video News">
            <span class="nome-canal">TV Video News</span>
        </div>

        <!-- TV Max -->
        <div class="canal" onclick="window.location.href='tvmax.html'">
            <img src="imagens/tvmax.png" alt="TV Max">
            <span class="nome-canal">TV Max</span>
        </div>

        <!-- TV Sul de Minas -->
        <div class="canal" onclick="window.location.href='tvsuldeminas.html'">
            <img src="imagens/tvsuldeminas.png" alt="TV Sul de Minas">
            <span class="nome-canal">TV Sul de Minas</span>
        </div>
    </div>

    <a href="index.html" class="btn-voltar">Voltar</a>

</body>
</html>
